add_newline = false

palette = "tokyonight"

[palettes.tokyonight]
background = "#1A1B26"
current_line = "#222330"
foreground = "#F1F1F1"
comment = "#8C8C8C"
cyan = "#7dcfff"
green = "#9ece6a"
orange = "#E57C46"
pink = "#FF0677"
purple = "#583794"
red = "#f7768e"
yellow = "#e0af68"
white = "#F1F1F1"

format = "$username$hostname$directory$git_branch$git_status$nodejs$python$rust$golang$cmd_duration$fill\n$character "

[directory.substitutions]
"Descargas" = " "
"Documentos" = "󰈙 "
"Escritorio" = "󰟀 "
"Imágenes" = " "
"Música" = " "
"Público" = " "
"Vídeos" = " "
"github" = " "

[character]
success_symbol = "[ ](bold green) "
error_symbol = "[ ](bold red) "
vicmd_symbol = "[](bold purple) "

[username]
show_always = true
style_user = "bold pink"
format = "[$user]($style)"

[hostname]
ssh_only = false
style = "bold purple"
format = "@[$hostname]($style) "

[container]
symbol = ' '
style = 'bold red dimmed'
format = '[$symbol \[$name\] ]($style)'

[os]
disabled = false
style = "bold white"

[os.symbols]
Ubuntu = " "
Debian = "󰣚 "
Fedora = " "
Pop = " "
Kali = " "
CachyOS = " 󰌽 "

[directory]
style = "bold cyan"

[git_branch]
symbol = " "
style = "bold orange"

[git_status]
style = "yellow"

[nodejs]
symbol = " "
style = "green"

[python]
symbol = " "
style = "blue"

[bun]
symbol = " "
style = "yellow" 

[golang]
symbol = " "
style = "cyan"

[time]
disabled = true
time_format = "%H:%M"
style = "cyan"
format = "[$time]($style)"
